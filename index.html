<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#B99B5F;--gold-light:#D4BC82;--dark:#1a1a1e;--dark2:#24242a;--dark3:#2e2e36;--text:#e8e8ec;--text-dim:#999;--text-dark:#666}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--dark);color:var(--text);overflow-x:hidden;line-height:1.6}
a{color:var(--gold);text-decoration:none}

.hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(26,26,30,0.5) 0%,rgba(26,26,30,0.7) 50%,rgba(26,26,30,0.95) 100%)}
.hero-content{position:relative;z-index:2;padding:0 24px;max-width:600px}
.hero-logo{width:80px;height:auto;margin:0 auto 24px;opacity:0.9}
.hero h1{font-size:28px;font-weight:300;letter-spacing:6px;margin-bottom:12px;color:#fff}
.hero h1 span{color:var(--gold);font-weight:500}
.hero p{font-size:14px;color:var(--text-dim);letter-spacing:2px;margin-bottom:32px}
.hero-tagline{font-size:16px;color:var(--gold-light);letter-spacing:4px;font-weight:300}
.scroll-hint{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);animation:bounce 2s infinite}
.scroll-hint svg{width:24px;height:24px;stroke:var(--gold);opacity:0.6}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}


/* Section */
.section{padding:64px 24px;max-width:800px;margin:0 auto}
.section-title{text-align:center;font-size:22px;font-weight:300;letter-spacing:4px;margin-bottom:8px;color:#fff}
.section-title::after{content:'';display:block;width:40px;height:2px;background:var(--gold);margin:16px auto 0}
.section-sub{text-align:center;font-size:13px;color:var(--text-dim);margin-bottom:40px;letter-spacing:1px}


/* 产品亮点 */
.features{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.feature-card{background:var(--dark2);border:1px solid rgba(185,155,95,0.15);border-radius:12px;padding:24px 16px;text-align:center;transition:all 0.3s}
